services:
  frontend:
    image: my-vue-app-payonners
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      VITE_APP_API_BASE_URL: http://backend:4300
    depends_on:
      - backend

  backend:
    image: my-nestjs-backend-payonners
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4300:4300"
    environment:
      NODE_ENV: production
      JWT_SECRET: your_jwt_secret
      JWT_EXPIRATION_TIME: 60m
      DATABASE_URL: mysql://root:admin@database:3307/Payonners
    depends_on:
      - database

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: Payonners
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

volumes:
  db_data: